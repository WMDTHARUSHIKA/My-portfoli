    <style>
      /* ---------------------------
         FIX: remove left/right white spaces (FULL WIDTH HERO)
      ---------------------------- */
      html,
      body {
        margin: 0;
        padding: 0;
      }

      body.index-page {
        overflow-x: hidden;
      }

      body.index-page #hero.hero.section {
        width: 100vw;
        max-width: 100vw;
        margin-left: calc(50% - 50vw);
        margin-right: calc(50% - 50vw);
        padding: 0 !important;
      }

      /* ---------------------------
         Professional theme tokens (scoped)
      ---------------------------- */
      body.index-page {
        --accent: #ff751f;
        --paper: rgba(255, 255, 255, 0.72);
        --ink: #1f1f1f;
        --muted: rgba(0, 0, 0, 0.65);
      }

      /* ---------------------------
         HERO layout + professional background
      ---------------------------- */
      #hero.hero.section {
        min-height: calc(100vh - 70px);
        background: none;
      }

      .hero-custom {
        width: 100%;
        position: relative;
        min-height: calc(100vh - 70px);
        padding: 64px 72px;
        box-sizing: border-box;

        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 56px;

        background: radial-gradient(
            900px 500px at 12% 18%,
            rgba(255, 255, 255, 0.3),
            rgba(255, 255, 255, 0) 60%
          ),
          radial-gradient(
            700px 520px at 86% 34%,
            rgba(255, 117, 31, 0.1),
            rgba(255, 117, 31, 0) 60%
          ),
          linear-gradient(180deg, #cdb098 0%, #d6b69c 28%, #caa98f 58%, #d6b69c 100%);
      }

      /* subtle texture overlay */
      .hero-custom::before {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.06) 0px,
          rgba(255, 255, 255, 0.06) 1px,
          rgba(255, 255, 255, 0) 10px,
          rgba(255, 255, 255, 0) 16px
        );
        pointer-events: none;
        opacity: 0.35;
      }

      /* LEFT SIDE (quote top + centered intro block) */
      .hero-left {
        flex: 1;
        min-width: 320px;

        align-self: stretch;
        display: flex;
        flex-direction: column;
        justify-content: center;

        position: relative;
        padding-top: 130px;
        padding-bottom: 30px;

        align-items: center;
        z-index: 1;
      }

      /* Quote stays at top-left */
      .hero-quote {
        position: absolute;
        top: 0;
        left: 0;

        font-family: "Dancing Script", cursive;
        font-size: 32px;
        font-weight: 700;
        line-height: 1.12;
        color: rgba(0, 0, 0, 0.58);
        margin: 0;
        max-width: 620px;
      }

      .hero-quote::after {
        content: "";
        display: block;
        width: 64px;
        height: 3px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.25);
        margin-top: 12px;
        transform: skewX(-18deg);
      }

      /* Centered block */
      .hero-center {
        width: 100%;
        max-width: 640px;
        text-align: center;
        transform: none;
      }

      .hero-center h2 {
        font-family: Poppins, sans-serif;
        font-weight: 800;
        letter-spacing: -0.5px;
        color: var(--ink);
        font-size: clamp(34px, 4.4vw, 58px);
        margin: 0 0 12px 0;
      }

      .hero-center p {
        font-family: Poppins, sans-serif;
        font-weight: 500;
        color: var(--muted);
        font-size: clamp(16px, 1.8vw, 22px);
        line-height: 1.55;
        margin: 0 0 26px 0;
      }

      .hero-center h2,
      .hero-center p {
        text-align: center !important;
      }

      /* Center buttons */
      #hero .hero-left .btn-row {
        justify-content: center !important;
      }

      /* ---------------------------
         Buttons (slightly stronger shadow)
      ---------------------------- */
      #hero .btn-get-started {
        border-radius: 999px !important;
        padding: 12px 26px !important;
        font-weight: 700 !important;
        letter-spacing: 0.4px;
        transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease,
          border-color 0.15s ease, color 0.15s ease;

        /* ✅ increased shadow */
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.16);
      }

      #hero .btn-get-started:hover {
        transform: translateY(-2px);

        /* ✅ increased hover shadow */
        box-shadow: 0 18px 38px rgba(0, 0, 0, 0.2);
      }

      #hero .btn-about {
        border: 2px solid var(--accent) !important;
        background: var(--accent) !important;
        color: #0f0f0f !important;
      }
      #hero .btn-about:hover {
        background: transparent !important;
        color: #0f0f0f !important;
      }

      #hero .btn-cv {
        background: #dcb597 !important;
        border: 2px solid var(--accent) !important;
        color: #1a1a1a !important;
      }
      #hero .btn-cv:hover {
        background: var(--accent) !important;
        border-color: var(--accent) !important;
        color: #ffffff !important;
      }

      /* ---------------------------
         RIGHT PHOTO + frame (✅ increased shadow)
      ---------------------------- */
      .hero-right {
        width: min(460px, 40vw);
        aspect-ratio: 1 / 1;
        margin-left: auto;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1;
      }

      .hero-photo-frame {
        width: 100%;
        height: 100%;
        padding: 14px;
        border-radius: 18px;
        background: var(--paper);
        border: 1px solid rgba(0, 0, 0, 0.1);
        box-sizing: border-box;
        position: relative;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        transform: rotate(-2.5deg);
        transform-origin: center;

        /* ✅ stronger, more “portfolio” shadow */
        box-shadow:
          0 28px 70px rgba(0, 0, 0, 0.24),
          0 10px 22px rgba(0, 0, 0, 0.14),
          inset 0 1px 0 rgba(255, 255, 255, 0.6);
      }

      .hero-photo-frame::before {
        content: "";
        position: absolute;
        inset: 10px;
        border-radius: 14px;
        border: 1px dashed rgba(255, 117, 31, 0.45);
        pointer-events: none;
      }

      .hero-photo {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        border-radius: 14px;
      }

      /* Responsive */
      @media (max-width: 900px) {
        .hero-custom {
          padding: 44px 22px;
          flex-direction: column;
          align-items: flex-start;
          gap: 26px;
        }

        .hero-left {
          align-self: auto;
          padding-top: 0;
          justify-content: flex-start;
          align-items: center;
        }

        .hero-quote {
          position: static;
          margin-bottom: 26px;
          font-size: 28px;
          text-align: center;
        }

        .hero-quote::after {
          margin-left: auto;
          margin-right: auto;
        }

        .hero-right {
          width: min(520px, 92vw);
          margin-left: 0;
        }

        .hero-photo-frame {
          transform: rotate(-1.5deg);
          box-shadow:
            0 24px 60px rgba(0, 0, 0, 0.22),
            0 8px 18px rgba(0, 0, 0, 0.12),
            inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }
      }
    </style>
